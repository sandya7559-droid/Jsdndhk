<!DOCTYPE html>

<html>

    <head>
<center>
        <title>

            Student Registration Form

        </title>

    </head>

    <body>

        <h2>Student Registration From</h2>

        <form action="#" method="post">

            <fieldset>

                <legend>Personal Information</legend>

                <label>Fulll Name:</label><br>

                <input type="text" name="fullname"required><br>

                <label>Father's Name:</label><br>

                <input type="text" name="fathername"><br>

                <label>Mother's Name:</label><br>

                <input type="text" name="mothername"><br>

                <label>Email:</label><br>

                <input type="email" name="email" required><br>

                <label>Password:</label><br>

                <input type="password" name="password" required><br>

                <label>Confirm Password</label><br>

                <input type="password" name="confirm password" required><br>

                <label>Gender</label><br>

                <input type="radio" name="gender" value="Male">Male

                <input type="radio" name="gender" value="Female">Female

                <input type="radio" name="gender" value="Others">Others

                <br>

                <label>Date Of Birth</label><br>

                <input type="date" name="dob"><br>

                <label>Blood Group</label><br>

                <select name="blood group">

                    <option value="">--select--</option>

                    <option>A+</option>

                    <option>A-</option>

                    <option>B+</option>

                    <option>B-</option>

                    <option>O+</option>

                    <option>O-</option>

                    <option>AB+</option>

                    <option>AB-</option>

                </select>

                <br>

            </fieldset>

            <fieldset>

                <legend>Contact Details</legend>

                <label>

                    Select Course:

                </label><br>

                <select name="course">

                    <option value="">--select course--</option>

                    <option>Bsc Computer Science</option>

                    <option>B.com</option>

                    <option>BA English</option>

                    <option>BBA</option>

                    <option>BCA</option>

                </select> 

                <br>

                <label>Year of Study</label><br>

                <input type="radio" name="year" value="1">1st year

                <input type="radio" name="year" value="2nd">2nd year

                <input type="radio" name="year" value="3rd">3rd year

                <br>

                <label>Skills:</label><br>

                <input type="checkbox" name="skill" value="HTML">HTML

                <input type="checkbox" name="skill" value="CSS">CSS

                <input type="checkbox" name="skill" value="JavaScript">JavaScript

                <input type="checkbox" name="skill" value="Python">Python

                <input type="checkbox" name="skill" value="java">Java

                <br>

            </fieldset>

            <br>

            <input type="submit" value="Register">

            <input type="reset" value="Clear Form">

        </form>
      </center>

    </body>

</html>
